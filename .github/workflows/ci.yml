name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: pandara_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Lint before anything else so failures are visible immediately
      - name: Run linter
        run: npm run lint

      # Apply the base DDL schema (CREATE TABLE IF NOT EXISTS) first,
      # then run node-pg-migrate for incremental migrations on top.
      - name: Apply base schema
        env:
          DATABASE_URL: postgres://test_user:test_password@localhost:5432/pandara_test_db
          PGSSLMODE: disable
        run: psql $DATABASE_URL -f schema/users.sql

      - name: Run database migrations
        env:
          DATABASE_URL: postgres://test_user:test_password@localhost:5432/pandara_test_db
          PGSSLMODE: disable
        run: npm run migrate up

      # Tests need JWT_SECRET set or the server refuses to start (by design).
      # This secret is only for CI; it is NOT used anywhere in production.
      - name: Run tests
        env:
          DATABASE_URL: postgres://test_user:test_password@localhost:5432/pandara_test_db
          JWT_SECRET: "ci-test-only-secret-at-least-32-chars-long!"
          NODE_ENV: test
          PGSSLMODE: disable
        run: npm test
