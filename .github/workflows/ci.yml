name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: pandara_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    # Shared env for all steps that need DB or JWT
    env:
      DATABASE_URL: postgres://test_user:test_password@localhost:5432/pandara_test_db
      JWT_SECRET: "ci-test-only-secret-minimum-32-chars-long!"
      NODE_ENV: test
      PGSSLMODE: disable

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Lint first — fast feedback, no DB needed
      - name: Lint
        run: npm run lint

      # The initial migration (1772227349976_initial-schema.js) creates ALL base tables
      # with IF NOT EXISTS, so a single `npm run migrate up` sets up the full schema.
      # No need for a separate psql step.
      - name: Run database migrations
        run: npm run migrate up

      - name: Run tests
        run: npm test
