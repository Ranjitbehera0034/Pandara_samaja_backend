name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: pandara_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://test_user:test_password@127.0.0.1:5432/pandara_test_db
      JWT_SECRET: "ci-test-only-secret-minimum-32-chars-long!"
      NODE_ENV: test
      PGSSLMODE: disable

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # Explicitly wait for Postgres to be ready on 127.0.0.1
      - name: Wait for Postgres
        run: |
          until pg_isready -h 127.0.0.1 -p 5432; do
            echo "Waiting for postgres..."
            sleep 1
          done

      #node-pg-migrate with --verbose to capture errors in logs if it fails
      - name: Run database migrations
        run: npm run migrate -- up --verbose

      - name: Run tests
        run: npm test
